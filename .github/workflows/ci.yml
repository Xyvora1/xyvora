name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black isort
      - run: ruff check src/
      - run: black --check src/
      - run: isort --check-only src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src/xyvora --cov-report=xml
      - uses: codecov/codecov-action@v3
        if: github.event_name == 'push'
        with:
          files: coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit
      - run: bandit -r src/xyvora/ -f json -o bandit-report.json
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-report.json
        if: hashFiles('bandit-report.json') != ''
